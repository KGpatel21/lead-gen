# =============================================================================
# Top-level nginx.conf — reverse proxy in front of `backend` + `frontend`.
#
# Features:
#   • HTTP → HTTPS redirect (activated once TLS certs are present).
#   • /api/*  → backend (Express).
#   • /ws     → backend, with WebSocket upgrade headers.
#   • /t/*, /unsubscribe/*, /health, /metrics → backend (open-tracking pixels,
#     unsubscribe endpoints, healthchecks, and prometheus metrics).
#   • /       → frontend (SPA served by the frontend container).
#   • gzip, aggressive caching for hashed assets, no-cache for the shell.
#   • ACME HTTP-01 challenge path reserved for certbot renewals.
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept       on;
  use                epoll;
}

http {
  # ---- Basics -----------------------------------------------------------
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  types_hash_max_size 4096;
  server_tokens off;
  server_names_hash_bucket_size 128;

  # Client tuning — long enough for large lead-list imports.
  client_max_body_size       25m;
  client_body_buffer_size    128k;
  client_header_timeout      30s;
  client_body_timeout        60s;
  send_timeout               60s;
  keepalive_timeout          65s;
  keepalive_requests         1000;
  reset_timedout_connection  on;

  # ---- Logging ----------------------------------------------------------
  log_format main
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" rt=$request_time upstream_rt=$upstream_response_time '
    'req_id=$http_x_request_id';
  access_log /var/log/nginx/access.log main buffer=32k flush=5s;
  error_log  /var/log/nginx/error.log  warn;

  # ---- Compression ------------------------------------------------------
  gzip                on;
  gzip_vary           on;
  gzip_min_length     512;
  gzip_comp_level     5;
  gzip_proxied        any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    application/wasm
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

  # ---- Rate limiting ----------------------------------------------------
  # Modest defaults, tuned separately at the Express layer.
  limit_req_zone $binary_remote_addr zone=api_rl:16m rate=60r/s;
  limit_req_zone $binary_remote_addr zone=auth_rl:8m rate=6r/s;

  # ---- Upstreams --------------------------------------------------------
  upstream backend_upstream {
    server backend:3000;
    keepalive 64;
  }
  upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
  }

  # WebSocket upgrade helper.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ---- Security headers (shared) ----------------------------------------
  # Applied to every response via `add_header ... always`.
  map $sent_http_content_type $csp_static_header {
    default "";
    "~^text/html" "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none';";
  }

  # =============================================================================
  # Port 80 — HTTP.
  #
  # Handles ACME challenges and (once TLS is enabled) redirects everything
  # else to HTTPS. During the initial bootstrap (before certs exist), it
  # also serves traffic directly by falling through to the shared handlers.
  # =============================================================================
  server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # certbot HTTP-01 challenge.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      allow all;
    }

    # ---------------------------------------------------------------------
    # BOOTSTRAP MODE (default).
    # Serves traffic on plain HTTP so `docker compose up` works without
    # certs. When you're ready to enforce HTTPS, comment the shared
    # `include` line below and uncomment the `return 301 https://...`.
    # ---------------------------------------------------------------------
    include /etc/nginx/conf.d/shared_locations.conf;

    # After first-time certbot issuance, enable:
    #   return 301 https://$host$request_uri;
    # and comment out the include above.
  }

  # =============================================================================
  # Port 443 — HTTPS.
  #
  # Activated automatically as soon as the certbot volume contains a cert
  # for the requested hostname. If certs are missing the block is a no-op
  # (nginx just skips it because the `ssl_certificate` file doesn't exist).
  # =============================================================================
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name ${NGINX_SERVER_NAME:-_};

    # Point these at your issued certificate. The `certbot` volume mount
    # in docker-compose.yml is /etc/letsencrypt.
    ssl_certificate     /etc/letsencrypt/live/${NGINX_SERVER_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${NGINX_SERVER_NAME}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${NGINX_SERVER_NAME}/chain.pem;

    # Modern TLS baseline.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # HSTS — 1 year including subdomains + preload eligibility.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection           "0" always;
    add_header Content-Security-Policy    $csp_static_header always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    include /etc/nginx/conf.d/shared_locations.conf;
  }
}
