# =============================================================================
# Container-local nginx.conf for the FRONTEND service.
#
# Not the reverse proxy — this only serves the built Vite SPA and returns
# it for any unknown route so the client router can handle it. The
# top-level reverse proxy (nginx/nginx.conf) fronts this container.
# =============================================================================

server {
  listen      80;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # Container liveness probe used by Docker HEALTHCHECK.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Long-cache immutable Vite-hashed assets.
  location /assets/ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # Never cache the shell — it references the current asset hashes.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
  }

  # SPA fallback for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip for text payloads (the reverse proxy also gzips, but this saves
  # a hop for direct hits during health probes).
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 512;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml
    application/xml
    application/wasm;
  gzip_vary on;
}
