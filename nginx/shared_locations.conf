# =============================================================================
# Shared upstream routing — included from both the :80 and :443 servers.
# Everything about WHERE traffic goes lives here so we never duplicate
# location blocks between the HTTP and HTTPS server contexts.
# =============================================================================

# ---- WebSockets (/ws, /socket.io) -------------------------------------------
# Must come BEFORE the /api and / catch-alls.
location /ws {
  proxy_pass         http://backend_upstream;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade $http_upgrade;
  proxy_set_header   Connection $connection_upgrade;
  proxy_set_header   Host $host;
  proxy_set_header   X-Real-IP $remote_addr;
  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_read_timeout 1h;
  proxy_send_timeout 1h;
}

# ---- Auth endpoints: tighter rate limit -------------------------------------
location ~ ^/api/(auth|billing/webhook) {
  limit_req            zone=auth_rl burst=10 nodelay;
  proxy_pass           http://backend_upstream;
  proxy_http_version   1.1;
  proxy_set_header     Host $host;
  proxy_set_header     X-Real-IP $remote_addr;
  proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header     X-Forwarded-Proto $scheme;
  proxy_set_header     X-Request-Id $http_x_request_id;
  proxy_read_timeout   60s;
  proxy_connect_timeout 10s;
  proxy_send_timeout   60s;
}

# ---- API (JSON) -------------------------------------------------------------
location /api/ {
  limit_req            zone=api_rl burst=120 nodelay;
  proxy_pass           http://backend_upstream;
  proxy_http_version   1.1;
  proxy_set_header     Host $host;
  proxy_set_header     X-Real-IP $remote_addr;
  proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header     X-Forwarded-Proto $scheme;
  proxy_set_header     X-Request-Id $http_x_request_id;
  proxy_read_timeout   120s;
  proxy_connect_timeout 10s;
  proxy_send_timeout   120s;
}

# ---- Tracking pixel + click redirect + unsubscribe --------------------------
location /t/ {
  # High-volume, low-latency. No rate limit.
  proxy_pass           http://backend_upstream;
  proxy_http_version   1.1;
  proxy_set_header     Host $host;
  proxy_set_header     X-Real-IP $remote_addr;
  proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header     X-Forwarded-Proto $scheme;
  # Never cache — every request records a distinct open.
  add_header           Cache-Control "no-store" always;
  proxy_read_timeout   30s;
}
location /unsubscribe/ {
  proxy_pass           http://backend_upstream;
  proxy_http_version   1.1;
  proxy_set_header     Host $host;
  proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header     X-Forwarded-Proto $scheme;
}

# ---- Ops endpoints ----------------------------------------------------------
location = /health         { proxy_pass http://backend_upstream; access_log off; }
location  /health/workers  { proxy_pass http://backend_upstream; access_log off; }
location = /metrics        { proxy_pass http://backend_upstream; access_log off; }

# ---- Frontend SPA (default) -------------------------------------------------
# Hashed asset files: long-cache. index.html + everything else: forward to
# the frontend container which enforces the shell no-cache header.
location ~* ^/assets/.+\.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
  proxy_pass           http://frontend_upstream;
  proxy_http_version   1.1;
  proxy_set_header     Host $host;
  proxy_cache_valid    200 302 30d;
  expires              30d;
  add_header           Cache-Control "public, max-age=2592000, immutable" always;
}

location / {
  proxy_pass           http://frontend_upstream;
  proxy_http_version   1.1;
  proxy_set_header     Host $host;
  proxy_set_header     X-Real-IP $remote_addr;
  proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header     X-Forwarded-Proto $scheme;
  proxy_read_timeout   30s;
}

# ---- Robots / favicon fast path --------------------------------------------
location = /favicon.ico { access_log off; log_not_found off; proxy_pass http://frontend_upstream; }
location = /robots.txt  { access_log off; log_not_found off; proxy_pass http://frontend_upstream; }
