# =============================================================================
# Outbound.AI — production docker-compose.
#
# Services:
#   postgres  — Postgres 16 with tuned health probe.
#   redis     — Redis 7 with persistence (rdb + aof).
#   backend   — Node.js API + BullMQ workers.
#   frontend  — Nginx serving the built React SPA.
#   nginx     — Reverse proxy in front of backend + frontend.
#   certbot   — Optional TLS issuance (start with `docker compose --profile tls up certbot`).
#
# All persistent state is on named volumes.
# Backend won't start until postgres AND redis report `service_healthy`.
#
# Environment resolution order (compose auto-loads .env):
#   1. shell env
#   2. .env in this directory
#
# Use `.env.example` as a template for what to fill in.
# =============================================================================

name: outbound-ai

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
    labels: "service"

services:
  # ---------------------------------------------------------------------------
  # Postgres 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: outbound-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-outbound_ai}
      POSTGRES_USER: ${POSTGRES_USER:-outbound}
      # `:-` (not `:?`) so `docker compose config` never fails on a fresh
      # checkout. The .env file bundles a strong default; you can override
      # it there or via the shell.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outbound-changeme-please-rotate}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outbound} -d ${POSTGRES_DB:-outbound_ai}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks: [outbound_net]
    logging: *default-logging
    # Expose the port only on the internal network by default. Uncomment
    # `ports` if you need to attach a client from the host.
    # ports:
    #   - "127.0.0.1:5432:5432"

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: outbound-redis
    restart: unless-stopped
    # BullMQ needs blocking commands, so we disable per-connection retry caps
    # via the app; here we just tune persistence + memory policy.
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    networks: [outbound_net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Backend (Node.js API + BullMQ workers)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Faster rebuilds; buildx layer cache is used if available in CI.
      cache_from:
        - outbound-ai-backend:cache
    image: outbound-ai-backend:latest
    container_name: outbound-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Hard-wire DATABASE_URL / REDIS_URL to the compose network service
      # names. Any localhost-scoped values a developer keeps in `.env` for
      # `npm run dev` are intentionally IGNORED here so the backend
      # container always talks to the `postgres` and `redis` sidecars.
      # To point at a managed DB (RDS, ElastiCache) instead, override the
      # whole line here or set DATABASE_URL_DOCKER / REDIS_URL_DOCKER in
      # .env (which win over the container URLs).
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://${POSTGRES_USER:-outbound}:${POSTGRES_PASSWORD:-outbound-changeme-please-rotate}@postgres:5432/${POSTGRES_DB:-outbound_ai}}
      REDIS_URL:    ${REDIS_URL_DOCKER:-redis://redis:6379}
      APP_URL:      ${APP_URL:-https://localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-${APP_URL:-https://localhost}}
      # Secrets — the .env file ships strong defaults; :- (not :?) so
      # `docker compose config` never fails on a fresh checkout. In a real
      # production deploy you MUST rotate these — they are checked into
      # the repo for developer convenience only.
      JWT_SECRET:            ${JWT_SECRET:-dev-jwt-secret-CHANGE-ME-before-deploying-c8b47b6b9e2c}
      ENCRYPTION_KEY:        ${ENCRYPTION_KEY:-dev-encryption-key-CHANGE-ME-32-bytes-abcdef1234567890abcd}
      ENCRYPTION_KEY_ID:     ${ENCRYPTION_KEY_ID:-v1}
      TRACKING_HMAC_SECRET:  ${TRACKING_HMAC_SECRET:-}
      OAUTH_STATE_SECRET:    ${OAUTH_STATE_SECRET:-}
      # CAN-SPAM (server/config.ts refuses to boot without these in production).
      SENDER_COMPANY_NAME:   ${SENDER_COMPANY_NAME:-Outbound.AI}
      SENDER_POSTAL_ADDRESS: ${SENDER_POSTAL_ADDRESS:-Address on file — please set SENDER_POSTAL_ADDRESS in .env for a real CAN-SPAM footer.}
      # Optional services (leave blank in .env if unused).
      AI_PROVIDER:          ${AI_PROVIDER:-groq}
      GROQ_API_KEY:         ${GROQ_API_KEY:-}
      GROQ_MODEL:           ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GEMINI_API_KEY:       ${GEMINI_API_KEY:-}
      STRIPE_SECRET_KEY:    ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_FREE_ID:       ${STRIPE_PRICE_FREE_ID:-}
      STRIPE_PRICE_GROWTH_ID:     ${STRIPE_PRICE_GROWTH_ID:-}
      STRIPE_PRICE_ENTERPRISE_ID: ${STRIPE_PRICE_ENTERPRISE_ID:-}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID:  ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      FIRECRAWL_API_KEY:    ${FIRECRAWL_API_KEY:-}
      AWS_ACCESS_KEY_ID:    ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:           ${AWS_REGION:-us-east-1}
      SES_FROM_EMAIL:       ${SES_FROM_EMAIL:-}
      SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET:-}
      LOG_LEVEL:            ${LOG_LEVEL:-info}
      # BullMQ worker knobs (safe defaults).
      EMAIL_WORKER_CONCURRENCY:      ${EMAIL_WORKER_CONCURRENCY:-3}
      SEQUENCE_ADVANCE_CONCURRENCY:  ${SEQUENCE_ADVANCE_CONCURRENCY:-3}
      SEQUENCE_TICK_INTERVAL_MS:     ${SEQUENCE_TICK_INTERVAL_MS:-60000}
      MAILBOX_POLL_INTERVAL_MS:      ${MAILBOX_POLL_INTERVAL_MS:-300000}
    healthcheck:
      # Backed by the healthcheck baked into the Dockerfile, but we redeclare
      # here so `docker compose ps` reports it consistently.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 40s
    networks: [outbound_net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Frontend (Nginx serving compiled SPA)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: outbound-ai-frontend:latest
    container_name: outbound-frontend
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s
    networks: [outbound_net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Reverse proxy (public entrypoint)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: outbound-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
    volumes:
      # Reverse-proxy config.
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/shared_locations.conf:/etc/nginx/conf.d/shared_locations.conf:ro
      # certbot integration.
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      # Access + error logs persist so backup-db.sh isn't the only story.
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    networks: [outbound_net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Certbot (opt-in). Run once to issue certs:
  #   docker compose --profile tls run --rm certbot
  # After issuance, flip nginx.conf to force HTTPS.
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: outbound-certbot
    profiles: ["tls"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Both CERTBOT_EMAIL and NGINX_SERVER_NAME must be set in .env before
    # invoking this profile. They intentionally use ':-' defaults so
    # `docker compose config` (which validates every service including
    # profiled ones) passes without them; certbot itself will error clearly
    # at runtime if they're still empty when the profile is executed.
    entrypoint: >
      /bin/sh -c "certbot certonly --webroot -w /var/www/certbot
      --email ${CERTBOT_EMAIL:-}
      --agree-tos --no-eff-email --keep-until-expiring
      -d ${NGINX_SERVER_NAME:-}"
    networks: [outbound_net]

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    name: outbound_postgres_data
  redis_data:
    name: outbound_redis_data
  certbot_certs:
    name: outbound_certbot_certs
  certbot_www:
    name: outbound_certbot_www
  nginx_logs:
    name: outbound_nginx_logs

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  outbound_net:
    name: outbound_net
    driver: bridge
